<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>입주민 참여플랫폼</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{background:#f7f8fa;font-family:'Noto Sans KR',sans-serif;color:#1f2937;}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}

/* ─ 반응형 핵심 ─ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;width:100%;}
.admin-split{display:grid;grid-template-columns:1fr 1.1fr;gap:16px;width:100%;}
.hide-mobile{display:block;}
.show-mobile{display:none;}
.scroll-x{display:flex;gap:6px;flex-wrap:wrap;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;}
.home-bottom{display:grid;grid-template-columns:1fr 1fr;gap:28px;width:100%;}
.pad-main{padding:28px 20px;width:100%;box-sizing:border-box;}
.stat-num{font-size:26px;}
.detail-pad{padding:28px 32px;}
.hero-pad{padding:28px 24px;}
.hero-h{font-size:22px;}
.hero-stat-num{font-size:20px;}

@media(max-width:768px){
  .grid-2{grid-template-columns:1fr;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-auto{grid-template-columns:1fr;}
  .admin-split{grid-template-columns:1fr;}
  .hide-mobile{display:none;}
  .show-mobile{display:flex;}
  .scroll-x{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .scroll-x::-webkit-scrollbar{height:0;}
  .hero-grid{grid-template-columns:1fr;}
  .home-bottom{grid-template-columns:1fr;}
  .pad-main{padding:14px 12px;}
  .stat-num{font-size:20px;}
  .detail-pad{padding:18px 16px;}
  .hero-pad{padding:20px 16px;}
  .hero-h{font-size:18px;}
  .hero-stat-num{font-size:17px;}
  .btn-row-mobile{flex-direction:column;}
  /* 모바일 건의사항 테이블 */
  .board-table-header{display:none;}
  .board-table-row{grid-template-columns:40px 1fr !important;}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .hero-stat-num{font-size:15px;}
  .stat-num{font-size:18px;}
}

/* ─ 공통 트랜지션 ─ */
.c-card{transition:box-shadow .2s,transform .2s;}
.c-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)!important;}
.btn-ol{transition:all .15s;}
.btn-ol:hover{background:#2563eb!important;color:#fff!important;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb!important;box-shadow:0 0 0 3px rgba(37,99,235,.12)!important;}
button:active{opacity:.82;}

/* ─ 모바일 드로어 ─ */
.drawer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:500;display:flex;flex-direction:column;}
.drawer-inner{background:#fff;padding:0 0 24px;border-radius:0 0 20px 20px;}
</style>
</head>

<div id="root"></div>

  <svg width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#e5e7eb" stroke-width="4"/>
    <circle cx="20" cy="20" r="16" fill="none" stroke="#1f2937" stroke-width="4"

  </svg>
  <div style="font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#9ca3af;font-weight:500;">플랫폼 로딩 중...</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec'; // ← 배포 후 웹앱 URL로 교체

/* GAS API 호출 헬퍼 */
async function gasGet(action) {
  const r = await fetch(GAS_URL + '?action=' + action);
  return r.json();
}
async function gasPost(body) {
  const r = await fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r.json();
}

/* 입주민 인증 */
async function verifyMember(dong, ho, name) {
  if(GAS_URL==='https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec') return true; // URL 미설정 시 로컬 모드(검증 스킵)
  try {
    const res = await gasPost({action:'verifyMember', dong, ho, name});
    return res.ok && res.data && res.data.verified;
  } catch(e) {
    return true; // 네트워크 오류 시 통과 (폴백)
  }
}



</script>
