<title>숲속마을 자연앤데시앙아파트 입주민 참여 플랫폼</title>
<style>
body{margin:0;background:#f7f8fa;display:flex;align-items:center;justify-content:center;height:100vh;}
</style>
</head>
<body>
<svg width="36" height="36" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="16" fill="none" stroke="#e5e7eb" stroke-width="4"/>
  <circle cx="20" cy="20" r="16" fill="none" stroke="#1f2937" stroke-width="4"
    stroke-dasharray="60 40" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 20 20" to="360 20 20" dur="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>
<script>
(function(){
  var isMobile=/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(navigator.userAgent)||window.innerWidth<=768;
  location.replace(isMobile?'./mobile.html':'./pc.html');
})();
</script>
