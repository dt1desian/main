/* ─ 반응형 핵심 ─ */

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;}

.stat-num{font-size:26px;}
.detail-pad{padding:28px 32px;}
.hero-pad{padding:28px 24px;}
.hero-h{font-size:22px;}
.hero-stat-num{font-size:20px;}

  .hero-grid{grid-template-columns:1fr;}
  .home-bottom{grid-template-columns:1fr;}
  .pad-main{padding:14px 12px;}
  .stat-num{font-size:20px;}
  .detail-pad{padding:18px 16px;}
  .hero-pad{padding:20px 16px;}
  .hero-h{font-size:18px;}
  .hero-stat-num{font-size:17px;}

  .board-table-header{display:none;}
  .board-table-row{grid-template-columns:40px 1fr !important;}

@media(max-width:480px){
  .grid-4{grid-template-columns:repeat(2,1fr);}

/* ─ 공통 트랜지션 ─ */

.btn-ol{transition:all .15s;}
.btn-ol:hover{background:#2563eb!important;color:#fff!important;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb!important;box-shadow:0 0 0 3px rgba(37,99,235,.12)!important;}
button:active{opacity:.82;}

/* ─ 모바일 드로어 ─ */

/* GAS API 호출 헬퍼 */
async function gasGet(action) {
  const r = await fetch(GAS_URL + '?action=' + action);
  return r.json();
}
async function gasPost(body) {
  const r = await fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r.json();
}

/* 입주민 인증 */
async function verifyMember(dong, ho, name) {
  if(GAS_URL==='https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec') return true; // URL 미설정 시 로컬 모드(검증 스킵)
  try {
    const res = await gasPost({action:'verifyMember', dong, ho, name});
    return res.ok && res.data && res.data.verified;
  } catch(e) {
    return true; // 네트워크 오류 시 통과 (폴백)
  }
}

function App(){
  const [page,setPage]   = useState("home");
  const [sub,setSub]     = useState("list");
  const [selId,setSelId] = useState(null);
  const [ag,setAg]       = useState(LS.ag.get);

  const [toast,setToast] = useState(null);
  const [adminOk,setAdminOk]=useState(false);
  const saveCfgToGas=(newCfg)=>{
    if(GAS_URL!=='https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec')
      gasPost({action:'setCfg',cfg:newCfg,adminPw:'admin1234'}).catch(()=>{});
  };
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState("");
  const [menuOpen,setMenuOpen]=useState(false);
  const [loading,setLoading]=useState(false);
  const [showPolicy,setShowPolicy]=useState(false);
  const [showModeSelect,setShowModeSelect]=useState(false);
  const isMobile=useIsMobile();

  // GAS 연동: 최초 로딩 시 서버 데이터 가져오기
  useEffect(()=>{
    if(GAS_URL==='https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec') return; // URL 미설정 시 localStorage 사용
    setLoading(true);
    gasGet('getAll').then(res=>{
      if(res.ok && res.data){
        const d=res.data;
        if(d.ag    && d.ag.length)    setAg(d.ag);
        if(d.vt    && d.vt.length)    setVt(d.vt);
        if(d.board && d.board.length) setBoard(d.board);
        if(d.cfg   && Object.keys(d.cfg).length) setCfg(p=>({...p,...d.cfg,
          periodDays:Number(d.cfg.periodDays||14),
          minSigs:Number(d.cfg.minSigs||30)
        }));
      }
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  // localStorage 동기화 (GAS URL 미설정 시 폴백)
  useEffect(()=>LS.ag.set(ag),[ag]);
  useEffect(()=>LS.board.set(board),[board]);
  useEffect(()=>LS.vt.set(vt),[vt]);
  useEffect(()=>LS.cfg.set(cfg),[cfg]);

  const notify=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

    setAg(p=>[a,...p]);

  };

        {page==="vote"&&sub==="list"&&<VoteList vt={vt} nav={nav} isMobile={isMobile}/>}
        {page==="vote"&&sub==="detail"&&selVt&&
          <VoteDetail vt={selVt} onBack={()=>nav("vote")} onVote={(id,e)=>{addVtE(id,e);setVt(p=>p.map(v=>v.id===id?{...v,votes:[...v.votes,e]}:v));}} notify={notify} isMobile={isMobile}/>}
        {page==="agenda"&&sub==="list"&&<AgendaList ag={ag} cfg={cfg} nav={nav} isMobile={isMobile}/>}
        {page==="agenda"&&sub==="detail"&&selAg&&
          <AgendaDetail ag={selAg} cfg={cfg} onBack={()=>nav("agenda")} onSign={(id,sig)=>{addAgSig(id,sig);setAg(p=>p.map(a=>a.id===id?{...a,sigs:[...a.sigs,sig]}:a));}} notify={notify} isMobile={isMobile}/>}
        {page==="board"&&sub==="list"&&<BoardList board={board} nav={nav} isMobile={isMobile}/>}
        {page==="board"&&sub==="detail"&&<BoardDetail post={board.find(b=>b.id===selId)} onBack={()=>nav("board")} isMobile={isMobile}/>}
        {page==="board"&&sub==="write"&&<BoardWrite board={board} onAdd={addBoard} onBack={()=>nav("board")} notify={notify} isMobile={isMobile}/>}
        {page==="agenda"&&sub==="submit"&&
          <AgendaSubmit ag={ag} onAdd={addAg} onBack={()=>nav("agenda")} notify={notify} isMobile={isMobile}/>}
        {page==="admin"&&(adminOk
          ?<AdminPanel ag={ag} vt={vt} cfg={cfg} board={board} patchAg={patchAg} patchVt={patchVt} addVt={addVt} setCfg={setCfg} onBack={()=>nav("home")} notify={notify} isMobile={isMobile}/>
          :<AdminLogin pw={adminPw} setPw={setAdminPw} err={adminErr} onLogin={()=>{
              if(GAS_URL!=='https://script.google.com/macros/s/AKfycbwev3tdzdLAsb47rT-JGGJSk5YkIO5S49jekCEGTp9IRZuSmAcslr9MF6D28X6-eVQsVw/exec'){
                gasPost({action:'adminLogin',pw:adminPw}).then(res=>{
                  if(res.ok && res.data){setAdminOk(true);setAdminErr("");}
                  else setAdminErr("비밀번호가 올바르지 않습니다.");
                }).catch(()=>{
                  // GAS 실패 시 로컬 폴백
                  if(adminPw===ADM_PW){setAdminOk(true);setAdminErr("");}
                  else setAdminErr("비밀번호가 올바르지 않습니다.");
                });
              } else {
                if(adminPw===ADM_PW){setAdminOk(true);setAdminErr("");}
                else setAdminErr("비밀번호가 올바르지 않습니다.");
              }
            }}/>
        )}
      </div>

      <Footer onPolicy={()=>setShowPolicy(true)} isMobile={isMobile} cfg={cfg} onAdminClick={(p)=>{ if(p==="board") nav("board"); else if(p==="admin") nav("admin"); }}/>
      {showPolicy&&<PolicyModal onClose={()=>setShowPolicy(false)}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>

function VoteCard({v,onClick}){
  const si=vtSt(v);
  const total=v.votes.length;
  const tally=v.options.reduce((a,o)=>({...a,[o]:v.votes.filter(x=>x.choice===o).length}),{});

  return(
    <div className="c-card" onClick={onClick}
      style={{background:"#fff",borderRadius:10,padding:"18px",border:"1px solid #e5e7eb",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
        <Tag color={v.type==="찬반"?"#16a34a":"#7c3aed"} bg={v.type==="찬반"?"#dcfce7":"#f5f3ff"}>{v.type}</Tag>
        <Tag color={si.c} bg={si.bg}>{si.t}</Tag>
        <span style={{marginLeft:"auto",fontSize:11,color:"#9ca3af"}}>{total}명</span>
      </div>
      <div style={{fontWeight:700,fontSize:15,color:"#111827",marginBottom:5,lineHeight:1.4}}>{v.title}</div>
      <div style={{fontSize:13,color:"#6b7280",lineHeight:1.5,marginBottom:12}}>{v.desc.slice(0,60)}…</div>
      {showBar&&(
        <div style={{marginBottom:10}}>
          {v.options.map(o=>{

            return(<div key={o} style={{marginBottom:6}}>

      <div style={{fontSize:11,color:"#9ca3af",borderTop:"1px solid #f3f4f6",paddingTop:8}}>마감 {fmt(v.endDate)}</div>
    </div>
  );
}

/* ── 투표 상세 ── */
function VoteDetail({vt,onBack,onVote,notify,isMobile}){
  const [showP,setShowP]=useState(false);
  const [showF,setShowF]=useState(false);
  const [done, setDone] =useState(false);
  const si=vtSt(vt);
  const ok=canVote(vt);
  const total=vt.votes.length;
  const tally=vt.options.reduce((a,o)=>({...a,[o]:vt.votes.filter(x=>x.choice===o).length}),{});
  const showRes=vt.showResult==="always"||(vt.showResult==="after"&&!ok);
  const maxCnt=Math.max(...Object.values(tally),1);
  return(
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      {showP&&<PrivacyModal purpose="투표·설문 참여" onOk={()=>{setShowP(false);setShowF(true);}} onCancel={()=>setShowP(false)}/>}
      <div className="detail-pad" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:14}}>
          <Tag color={vt.type==="찬반"?"#16a34a":"#7c3aed"} bg={vt.type==="찬반"?"#dcfce7":"#f5f3ff"}>{vt.type}</Tag>
          <Tag color={si.c} bg={si.bg}>{si.t}</Tag>
          <span style={{marginLeft:"auto",fontSize:11,color:"#9ca3af"}}>{vt.id}</span>
        </div>
        <h2 style={{fontSize:isMobile?18:22,fontWeight:800,color:"#111827",marginBottom:8,letterSpacing:"-0.3px"}}>{vt.title}</h2>
        <div style={{fontSize:12,color:"#9ca3af",marginBottom:18}}>📅 {fmt(vt.startDate)} ~ {fmt(vt.endDate)}&nbsp;·&nbsp;✋ {total}명 참여</div>
        <p style={{fontSize:14,color:"#374151",lineHeight:1.8,marginBottom:24,padding:"14px 16px",background:"#f9fafb",borderRadius:8,borderLeft:`3px solid ${BLUE}`}}>{vt.desc}</p>

        {showRes&&total>0&&(
          <div style={{marginBottom:24}}>
            <div style={{fontWeight:700,color:"#111827",fontSize:14,marginBottom:14}}>집계 결과</div>
            {vt.options.map(o=>{
              const cnt=tally[o]||0,pct=total>0?Math.round(cnt/total*100):0;
              const isTop=cnt===maxCnt&&cnt>0;
              return(
                <div key={o} style={{marginBottom:10,padding:"11px 14px",background:isTop?LBLUE:"#f9fafb",borderRadius:8,border:`1px solid ${isTop?"#bfdbfe":"#e5e7eb"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                    <span style={{fontWeight:isTop?700:400,fontSize:14,color:isTop?BLUE:"#374151"}}>{isTop?"1위  ":""}{o}</span>
                    <span style={{fontWeight:700,fontSize:14,color:isTop?BLUE:"#6b7280"}}>{cnt}명 ({pct}%)</span>
                  </div>
                  <div style={{height:5,background:"rgba(0,0,0,.06)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:isTop?BLUE:"#d1d5db",borderRadius:3}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {vt.showResult==="after"&&ok&&<InfoBox msg="투표 결과는 의견수렴 기간 종료 후 공개됩니다."/>}
        {ok&&!showF&&!done&&<PBtn onClick={()=>setShowP(true)}>의견 선택하기 →</PBtn>}
        {done&&<SuccessBox msg="의견이 정상적으로 제출되었습니다. 감사합니다."/>}
        {!ok&&vt.status==="active"&&<WarnBox msg="의견수렴 기간이 종료되었습니다."/>}
        {showF&&<VoteForm vt={vt} onSubmit={e=>{onVote(vt.id,e);setShowF(false);setDone(true);notify("의견이 제출되었습니다.");}} onCancel={()=>setShowF(false)} notify={notify} isMobile={isMobile}/>}
      </div>
    </div>
  );
}

function VoteForm({vt,onSubmit,onCancel,notify,isMobile}){
  const [f,setF]=useState({dong:"",ho:"",name:"",phone:"",choice:""});
  const [verifying,setVerifying]=useState(false);
  const submit=async()=>{
    if(!f.dong||!f.ho||!f.name){notify("동호수와 이름을 입력해주세요.","err");return;}
    if(!f.choice){notify("의견 항목을 선택해주세요.","err");return;}
    if(vt.votes.find(v=>v.dong===f.dong&&v.ho===f.ho)){notify("이미 의견을 제출한 세대입니다.","err");return;}
    setVerifying(true);
    const ok=await verifyMember(f.dong,f.ho,f.name);
    setVerifying(false);
    if(!ok){notify("입주민 정보가 일치하지 않습니다. 동·호수·이름을 확인해주세요.","err");return;}
    onSubmit({dong:f.dong,ho:f.ho,name:f.name,phone:maskPh(f.phone||""),choice:f.choice,date:today()});
  };
  return(
    <div style={{marginTop:18,background:"#f9fafb",borderRadius:10,padding:"18px",border:"1px solid #e5e7eb"}}>
      <div style={{fontWeight:700,color:"#111827",marginBottom:14,fontSize:14}}>동호수 인증 후 의견 제출</div>
      <div style={{display:"flex",gap:10,marginBottom:10}}>
        <Fld label="동"><input style={S.inp} placeholder="예: 101"  value={f.dong}  onChange={e=>setF(p=>({...p,dong:e.target.value}))}/></Fld>
        <Fld label="호"><input style={S.inp} placeholder="예: 1502" value={f.ho}    onChange={e=>setF(p=>({...p,ho:e.target.value}))}/></Fld>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <Fld label="이름">    <input style={S.inp} placeholder="실명"          value={f.name}  onChange={e=>setF(p=>({...p,name:e.target.value}))}/></Fld>
        <Fld label="전화번호"><input style={S.inp} placeholder="010-0000-0000 (선택)" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/></Fld>
      </div>
      <Fld label="의견 선택">
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
          {vt.options.map(o=>(
            <label key={o} onClick={()=>setF(p=>({...p,choice:o}))}
              style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:8,
                border:`1.5px solid ${f.choice===o?BLUE:"#e5e7eb"}`,
                background:f.choice===o?LBLUE:"#fff",cursor:"pointer",
                fontWeight:f.choice===o?600:400,color:f.choice===o?BLUE:"#374151",
                minHeight:44}}>
              <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${f.choice===o?BLUE:"#d1d5db"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {f.choice===o&&<div style={{width:7,height:7,borderRadius:"50%",background:BLUE}}/>}
              </div>
              {o}
            </label>
          ))}
        </div>
      </Fld>
      <div className="btn-row-mobile" style={{display:"flex",gap:8,marginTop:16}}>
        <PBtn onClick={submit}>{verifying?"인증중...":"제출하기"}</PBtn>
        <GBtn onClick={onCancel}>취소</GBtn>
      </div>
    </div>
  );
}

  const [cat,setCat]=useState("전체");
  const [st, setSt] =useState("전체");
  const [sort,setSort]=useState("latest");
  const filtered=[...ag.filter(a=>{
    const cOk=cat==="전체"||a.cat===cat;
    const sOk=st==="전체"||(st==="검토중"&&a.status==="draft")||(st==="의견수렴"&&isActiveAg(a))||(st==="완료"&&["passed","rejected","closed"].includes(a.status));
    return cOk&&sOk;
  })].sort((a,b)=>sort==="latest"?b.createdAt.localeCompare(a.createdAt):b.sigs.length-a.sigs.length);
  return(
    <div>
      <PageHero icon="📋" title="안건 제안" desc="입주자대표회의에 상정할 안건을 제안하고 이웃의 찬성을 모아보세요." isMobile={isMobile}>
        <button onClick={()=>nav("agenda","submit")}
          style={{padding:"9px 18px",borderRadius:8,border:"none",background:"#1f2937",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,minHeight:40}}>
          + 안건 신청
        </button>
      </PageHero>
      <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
        <span style={{fontSize:11,color:"#9ca3af",fontWeight:600,display:"block",marginBottom:6}}>분야</span>
        <div className="scroll-x">
          {["전체",...CATS].map(c=><FBtn key={c} active={cat===c} onClick={()=>setCat(c)} small>{c}</FBtn>)}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}}>
        <div className="scroll-x">{["전체","검토중","의견수렴","완료"].map(s=><FBtn key={s} active={st===s} onClick={()=>setSt(s)}>{s}</FBtn>)}</div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          {["최신순","찬성순"].map(s=>(
            <SortBtn key={s} active={sort===(s==="최신순"?"latest":"count")} onClick={()=>setSort(s==="최신순"?"latest":"count")}>✓ {s}</SortBtn>
          ))}
        </div>
      </div>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:10}}>총 {filtered.length}건</div>
      {filtered.length===0?<EmptyMsg msg="해당 안건이 없습니다."/>:
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(a=><AgendaRow key={a.id} a={a} cfg={cfg} onClick={()=>nav("agenda","detail",a.id)} isMobile={isMobile}/>)}
        </div>}
    </div>
  );
}

function AgendaRow({a,cfg,onClick,isMobile}){
  const si=agSt(a);
  const isDraft=a.status==="draft";
  const total=a.sigs.length,max=cfg.minSigs||1;
  const p=Math.min(100,Math.round(total/max*100));
  const descShow=isDraft?a.desc.slice(0,Math.max(1,Math.floor(a.desc.length*.08))):a.desc.slice(0,70);
  return(
    <div className="c-card" onClick={onClick}
      style={{background:"#fff",borderRadius:10,padding:"16px",border:`1px solid ${isDraft?"#fde68a":"#e5e7eb"}`,cursor:"pointer",
        boxShadow:"0 1px 4px rgba(0,0,0,.04)",display:"flex",gap:12,alignItems:"flex-start"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",gap:6,marginBottom:7,alignItems:"center",flexWrap:"wrap"}}>
          <Tag color={catTag(a.cat).color} bg={catTag(a.cat).background}>{a.cat}</Tag>
          <Tag color={si.c} bg={si.bg}>{si.t}</Tag>
          {!isMobile&&<span style={{fontSize:11,color:"#9ca3af",marginLeft:"auto"}}>📍 {maskDong(a.submitter.dong)}동 {maskHo(a.submitter.ho)}호 {maskName(a.submitter.name)}</span>}
        </div>
        <div style={{fontWeight:700,fontSize:14,color:"#111827",marginBottom:3,lineHeight:1.4}}>{a.title}</div>
        <div style={{position:"relative",overflow:"hidden",maxHeight:34}}>
          <div style={{fontSize:12,color:"#6b7280",lineHeight:1.5}}>{descShow}…</div>
          {isDraft&&<div style={{position:"absolute",inset:0,backdropFilter:"blur(5px)",background:"linear-gradient(90deg,transparent,rgba(255,255,255,.92) 55%)",display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
            <span style={{fontSize:10,color:"#92400e",background:"#fef9c3",borderRadius:4,padding:"1px 7px",fontWeight:600,border:"1px solid #fde68a",whiteSpace:"nowrap"}}>승인 대기</span>
          </div>}
        </div>
      </div>
      {!isDraft&&(
        <div style={{textAlign:"right",flexShrink:0,minWidth:isMobile?60:72}}>
          <div style={{fontSize:isMobile?18:22,fontWeight:800,color:p>=100?"#16a34a":BLUE,lineHeight:1}}>{total}</div>
          <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>/{max}명</div>
          <div style={{marginTop:6,height:4,background:"#f3f4f6",borderRadius:2,overflow:"hidden",width:"100%"}}>
            <div style={{height:"100%",width:`${p}%`,background:p>=100?"#16a34a":BLUE,borderRadius:2}}/>
          </div>
          {!isMobile&&a.endDate&&<div style={{fontSize:10,color:"#9ca3af",marginTop:3}}>~{fmt(a.endDate)}</div>}
        </div>
      )}
    </div>
  );
}

/* ── 안건 상세 ── */

  const [showF,setShowF]=useState(false);

  return(
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      {showP&&<PrivacyModal purpose="안건 찬성" onOk={()=>{setShowP(false);setShowF(true);}} onCancel={()=>setShowP(false)}/>}
      <div className="detail-pad" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:14}}>
          <Tag color={catTag(ag.cat).color} bg={catTag(ag.cat).background}>{ag.cat}</Tag>
          <Tag color={si.c} bg={si.bg}>{si.t}</Tag>
          <span style={{marginLeft:"auto",fontSize:11,color:"#9ca3af"}}>{ag.id}</span>
        </div>
        <h2 style={{fontSize:isMobile?18:22,fontWeight:800,color:"#111827",marginBottom:8,letterSpacing:"-0.3px"}}>{ag.title}</h2>
        <div style={{fontSize:12,color:"#9ca3af",marginBottom:18,display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>👤 {maskDong(ag.submitter.dong)}동 {maskHo(ag.submitter.ho)}호 {maskName(ag.submitter.name)}</span>
          {ag.endDate?<span>📅 {fmt(ag.approvedAt)} ~ <b style={{color:"#374151"}}>{fmt(ag.endDate)}</b></span>
            :<span style={{color:"#d97706"}}>📅 승인 대기중</span>}
        </div>
        {isDraft?(
          <WarnBox msg="🔒 관리자 승인 대기중입니다. 승인 완료 후 전체 내용 및 찬성 제출이 가능합니다."/>
        ):(
          <>
            <p style={{fontSize:14,color:"#374151",lineHeight:1.8,marginBottom:22,padding:"14px 16px",background:"#f9fafb",borderRadius:8,borderLeft:"3px solid #e5e7eb"}}>{ag.desc}</p>
            {cfg.minSigs>0&&(
              <div style={{background:"#f9fafb",borderRadius:8,padding:"14px 18px",marginBottom:22}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{fontWeight:600,color:"#374151"}}>찬성 현황</span>
                  <span style={{fontWeight:700,color:p>=100?"#16a34a":BLUE}}>{total}명 / {max}명 ({p}%)</span>
                </div>
                <div style={{height:7,background:"#e5e7eb",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${p}%`,background:p>=100?"#16a34a":BLUE,borderRadius:4}}/>
                </div>
              </div>
            )}
            {canSign&&!showF&&<PBtn onClick={()=>setShowP(true)}>✋ 이 안건에 찬성합니다</PBtn>}
            {!canSign&&ag.status==="active"&&<WarnBox msg="의견수렴 기간이 종료되었습니다."/>}
            {showF&&<AgSignForm existing={ag.sigs} onSign={sig=>{onSign(ag.id,sig);setShowF(false);notify("찬성 의견이 제출되었습니다.");}} onCancel={()=>setShowF(false)} notify={notify} isMobile={isMobile}/>}
          </>
        )}
      </div>
    </div>
  );

function AgSignForm({existing,onSign,onCancel,notify,isMobile}){
  const [f,setF]=useState({dong:"",ho:"",name:"",phone:""});
  const [verifying,setVerifying]=useState(false);
  const submit=async()=>{
    if(!f.dong||!f.ho||!f.name){notify("동호수와 이름을 입력해주세요.","err");return;}
    if(existing.find(s=>s.dong===f.dong&&s.ho===f.ho)){notify("이미 의견을 제출한 세대입니다.","err");return;}
    setVerifying(true);
    const ok=await verifyMember(f.dong,f.ho,f.name);
    setVerifying(false);
    if(!ok){notify("입주민 정보가 일치하지 않습니다. 동·호수·이름을 확인해주세요.","err");return;}
    onSign({dong:f.dong,ho:f.ho,name:f.name,phone:maskPh(f.phone||""),date:today()});
  };
  return(
    <div style={{marginTop:18,background:"#f9fafb",borderRadius:10,padding:"18px",border:"1px solid #e5e7eb"}}>
      <div style={{fontWeight:700,color:"#111827",marginBottom:14,fontSize:14}}>동호수 인증 후 찬성 제출</div>
      <div style={{display:"flex",gap:10,marginBottom:10}}>
        <Fld label="동"><input style={S.inp} placeholder="예: 101"  value={f.dong}  onChange={e=>setF(p=>({...p,dong:e.target.value}))}/></Fld>
        <Fld label="호"><input style={S.inp} placeholder="예: 1502" value={f.ho}    onChange={e=>setF(p=>({...p,ho:e.target.value}))}/></Fld>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <Fld label="이름">    <input style={S.inp} placeholder="실명"          value={f.name}  onChange={e=>setF(p=>({...p,name:e.target.value}))}/></Fld>
        <Fld label="전화번호"><input style={S.inp} placeholder="010-0000-0000 (선택)" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/></Fld>
      </div>
      <div className="btn-row-mobile" style={{display:"flex",gap:8}}>
        <PBtn onClick={submit}>{verifying?"인증중...":"제출하기"}</PBtn>
        <GBtn onClick={onCancel}>취소</GBtn>
      </div>
    </div>
  );
}

/* ── 안건 신청 ── */
function AgendaSubmit({ag,onAdd,onBack,notify,isMobile}){
  const [step,setStep]=useState("privacy");
  const [f,setF]=useState({title:"",desc:"",cat:"",dong:"",ho:"",name:"",phone:""});
  const [err,setErr]=useState({});
  if(step==="privacy") return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      <PrivacyModal purpose="안건 신청" onOk={()=>setStep("form")} onCancel={onBack} inline/>
    </div>
  );
  const validate=()=>{
    const e={};
    if(!f.title.trim())e.title="입력하세요.";if(!f.desc.trim())e.desc="입력하세요.";
    if(!f.cat)e.cat="선택하세요.";if(!f.dong)e.dong="필수";if(!f.ho)e.ho="필수";if(!f.name)e.name="필수";// 전화번호는 선택 (입주민 인증은 동호수+이름으로 처리)
    setErr(e);return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!validate())return;
    const id=`AGD-${String(ag.length+1).padStart(3,"0")}`;
    onAdd({id,title:f.title,desc:f.desc,cat:f.cat,submitter:{dong:f.dong,ho:f.ho,name:f.name,phone:maskPh(f.phone)},status:"draft",approvedAt:"",endDate:"",sigs:[],createdAt:today()});
    onBack();
  };
  return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      <div className="detail-pad" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <h2 style={{fontSize:isMobile?17:20,fontWeight:800,color:"#111827",marginBottom:4}}>안건 신청</h2>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>관리자 승인 후 공개됩니다. 개인정보는 처리 완료 후 즉시 폐기됩니다.</p>
        <SLabel>안건 내용</SLabel>
        <Fld label="제목" err={err.title}><input style={S.inp} placeholder="안건 제목을 간결하게 입력하세요" value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))}/></Fld>
        <Fld label="분야" err={err.cat}>
          <select style={S.inp} value={f.cat} onChange={e=>setF(p=>({...p,cat:e.target.value}))}>
            <option value="">선택하세요</option>{CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </Fld>
        <Fld label="상세 내용" err={err.desc}><textarea style={{...S.inp,minHeight:100,resize:"vertical"}} placeholder="안건 배경, 현황, 요구사항을 구체적으로 작성해 주세요" value={f.desc} onChange={e=>setF(p=>({...p,desc:e.target.value}))}/></Fld>
        <SLabel>신청자 정보 (관리자 열람 · 처리 완료 후 폐기)</SLabel>
        <div style={{display:"flex",gap:10}}>
          <Fld label="동" err={err.dong}><input style={S.inp} placeholder="예: 101"  value={f.dong} onChange={e=>setF(p=>({...p,dong:e.target.value}))}/></Fld>
          <Fld label="호" err={err.ho}>  <input style={S.inp} placeholder="예: 1502" value={f.ho}   onChange={e=>setF(p=>({...p,ho:e.target.value}))}/></Fld>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Fld label="이름"     err={err.name}> <input style={S.inp} placeholder="실명"          value={f.name}  onChange={e=>setF(p=>({...p,name:e.target.value}))}/></Fld>
          <Fld label="전화번호" err={err.phone}><input style={S.inp} placeholder="010-0000-0000 (선택)" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/></Fld>
        </div>
        <div className="btn-row-mobile" style={{display:"flex",gap:8,marginTop:8}}>
          <PBtn onClick={submit}>안건 접수하기</PBtn>
          <GBtn onClick={onBack}>취소</GBtn>
        </div>
      </div>
    </div>
  );
}

function PrivacyModal({purpose,onOk,onCancel,inline}){
  const [agreed,setAgreed]=useState(false);
  const box=(
    <div className="detail-pad" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
      <h3 style={{color:"#111827",marginBottom:18,fontSize:17,fontWeight:800}}>개인정보 수집·이용 동의</h3>
      <div style={{overflowX:"auto",marginBottom:16}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:360}}>
          <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}}>
            {["수집 항목","수집 목적","보유 및 폐기"].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",color:"#374151",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody><tr>
            <td style={tdS}>동·호수, 이름, 전화번호</td>
            <td style={tdS}>{purpose} 본인 확인 및 중복 방지</td>
            <td style={tdS}>목적 달성 후 <b>즉시 폐기</b></td>
          </tr></tbody>
        </table>
      </div>
      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"11px 14px",fontSize:13,color:"#92400e",marginBottom:18,lineHeight:1.7}}>
        ※ 위 정보는 목적 외 용도로 사용되지 않으며, 목적 달성 시 지체없이 파기됩니다.<br/>
        ※ 동의를 거부할 권리가 있으나 거부 시 {purpose}이(가) 불가합니다.
      </div>
      <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:18,padding:"12px 14px",background:"#f9fafb",borderRadius:8,border:`1.5px solid ${agreed?BLUE:"#e5e7eb"}`,minHeight:48}}>
        <input type="checkbox" checked={agreed} onChange={e=>setAgreed(e.target.checked)} style={{width:18,height:18,accentColor:BLUE,flexShrink:0}}/>
        <span style={{fontSize:13,fontWeight:600,color:agreed?BLUE:"#374151"}}>위 개인정보 수집·이용에 동의합니다 (필수)</span>
      </label>
      <div className="btn-row-mobile" style={{display:"flex",gap:8}}>
        <PBtn onClick={()=>agreed&&onOk()} style={{opacity:agreed?1:.4}}>동의하고 계속</PBtn>
        <GBtn onClick={onCancel}>취소</GBtn>
      </div>
    </div>
  );
  if(inline) return box;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:"16px",overflowY:"auto"}}><div style={{maxWidth:580,width:"100%"}}>{box}</div></div>;
}
const tdS={padding:"9px 12px",borderBottom:"1px solid #f3f4f6",color:"#6b7280",verticalAlign:"top",lineHeight:1.6};

    setVerifying(true);

                <Fld label="호"><input style={S.inp} placeholder="예: 1502" value={f.ho}   onChange={e=>setF(p=>({...p,ho:e.target.value}))}/></Fld>
              </div>
              <Fld label="이름"><input style={S.inp} placeholder="실명 입력" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&verify()}/></Fld>
              {err&&<div style={{color:"#dc2626",fontSize:12,marginBottom:8,fontWeight:500}}>{err}</div>}

          <>
            <p style={{fontSize:15,color:"#374151",lineHeight:1.8,padding:"16px",background:"#f9fafb",borderRadius:8,borderLeft:"3px solid #2563eb",marginBottom:post.answer?20:0}}>{post.content}</p>

function BoardWrite({board,onAdd,onBack,notify,isMobile}){
  const [step,setStep]=useState("privacy");
  const [f,setF]=useState({title:"",content:"",cat:"",dong:"",ho:"",name:"",phone:""});
  const [err,setErr]=useState({});
  if(step==="privacy") return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      <PrivacyModal purpose="건의사항 작성" onOk={()=>setStep("form")} onCancel={onBack} inline/>
    </div>
  );
  const validate=()=>{
    const e={};
    if(!f.title.trim())e.title="제목을 입력하세요.";
    if(!f.content.trim())e.content="내용을 입력하세요.";
    if(!f.cat)e.cat="분야를 선택하세요.";
    if(!f.dong)e.dong="동을 입력하세요.";
    if(!f.ho)e.ho="호를 입력하세요.";
    if(!f.name)e.name="이름을 입력하세요.";
    if(!f.phone)e.phone="전화번호를 입력하세요.";
    setErr(e);return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!validate())return;
    const id=`BRD-${String(board.length+1).padStart(3,"0")}`;
    onAdd({id,title:f.title,content:f.content,cat:f.cat,
      author:{dong:f.dong,ho:f.ho,name:f.name,phone:maskPh(f.phone)},
      createdAt:today(),status:"pending",answer:"",answeredAt:""});
    onBack();
  };
  return(
    <div style={{maxWidth:640,margin:"0 auto"}}>
      <BackBtn onClick={onBack}/>
      <div className="detail-pad" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <h2 style={{fontSize:isMobile?17:20,fontWeight:800,color:"#111827",marginBottom:4}}>건의사항 작성</h2>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>내용은 작성자 본인만 열람 가능합니다. 관리자가 검토 후 답변드립니다.</p>
        <SLabel>건의 내용</SLabel>
        <Fld label="제목" err={err.title}><input style={S.inp} placeholder="건의 제목을 간결하게 입력하세요" value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))}/></Fld>
        <Fld label="분야" err={err.cat}>
          <select style={S.inp} value={f.cat} onChange={e=>setF(p=>({...p,cat:e.target.value}))}>
            <option value="">선택하세요</option>{BOARD_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </Fld>
        <Fld label="상세 내용" err={err.content}><textarea style={{...S.inp,minHeight:130,resize:"vertical"}} placeholder="건의 내용을 구체적으로 작성해 주세요" value={f.content} onChange={e=>setF(p=>({...p,content:e.target.value}))}/></Fld>
        <SLabel>작성자 정보 (관리자만 열람 · 목적 달성 후 폐기)</SLabel>
        <div style={{display:"flex",gap:10}}>
          <Fld label="동" err={err.dong}><input style={S.inp} placeholder="예: 101"  value={f.dong} onChange={e=>setF(p=>({...p,dong:e.target.value}))}/></Fld>
          <Fld label="호" err={err.ho}>  <input style={S.inp} placeholder="예: 1502" value={f.ho}   onChange={e=>setF(p=>({...p,ho:e.target.value}))}/></Fld>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Fld label="이름"     err={err.name}> <input style={S.inp} placeholder="실명 입력"      value={f.name}  onChange={e=>setF(p=>({...p,name:e.target.value}))}/></Fld>
          <Fld label="전화번호" err={err.phone}><input style={S.inp} placeholder="010-0000-0000 (선택)" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/></Fld>
        </div>
        <div className="btn-row-mobile" style={{display:"flex",gap:8,marginTop:8}}>
          <PBtn onClick={submit}>건의하기</PBtn>
          <GBtn onClick={onBack}>취소</GBtn>
        </div>
      </div>
    </div>
  );
}

                  </div>);
                })}
                <div style={{fontSize:12,color:"#9ca3af",marginTop:10,fontWeight:600}}>참여자 ({v.votes.length}명)</div>
                <div style={{maxHeight:160,overflowY:"auto",marginTop:6}}>
                  {v.votes.length===0?<EmptyMsg msg="없음"/>:v.votes.map((vv,i)=>(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"16px 1fr 0.7fr 0.8fr",gap:6,padding:"5px 0",borderBottom:"1px solid #f9fafb",fontSize:12,color:"#374151"}}>

                      <span style={{color:BLUE,fontWeight:600}}>{vv.choice}</span>
                      <span style={{color:"#9ca3af"}}>{vv.date}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function AdminBoard({board,notify}){
  const [sel,setSel]=useState(null);
  const [answer,setAnswer]=useState("");

  const saveAnswer=(id)=>{
    if(!answer.trim()){notify("답변 내용을 입력하세요.","err");return;}
    const stored=JSON.parse(localStorage.getItem("rp3_board")||"[]");
    const updated=stored.map(b=>b.id===id?{...b,status:"answered",answer,answeredAt:today()}:b);
    localStorage.setItem("rp3_board",JSON.stringify(updated));
    setSel(p=>({...p,status:"answered",answer,answeredAt:today()}));
    setAnswer("");
    notify("답변이 등록되었습니다.");
  };

  const latestBoard=JSON.parse(localStorage.getItem("rp3_board")||JSON.stringify(board));

  return(
    <div style={{width:"100%"}}>    <div style={{display:"grid",gridTemplateColumns:sel?"1fr 1.1fr":"1fr",gap:16}}>
        <div>
          {latestBoard.length===0&&<EmptyMsg msg="건의사항이 없습니다."/>}
          {latestBoard.map(b=>(
            <div key={b.id} style={{...S.adminRow,borderLeft:sel&&sel.id===b.id?`3px solid ${BLUE}`:"3px solid transparent",marginBottom:8,cursor:"pointer"}}
              onClick={()=>{setSel(b);setAnswer(b.answer||"");}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                <Tag color={catTag(b.cat).color} bg={catTag(b.cat).background}>{b.cat}</Tag>
                <Tag color={b.status==="answered"?"#16a34a":"#d97706"} bg={b.status==="answered"?"#dcfce7":"#fef3c7"}>
                  {b.status==="answered"?"답변완료":"답변대기"}
                </Tag>
                <span style={{marginLeft:"auto",fontSize:11,color:"#9ca3af"}}>{b.id}</span>
              </div>
              <div style={{fontWeight:700,fontSize:14,color:"#111827",marginBottom:3}}>{b.title}</div>
              <div style={{fontSize:12,color:"#9ca3af"}}>{maskDong(b.author.dong)}동 {maskHo(b.author.ho)}호 <b style={{color:"#374151"}}>{b.author.name}</b> · {b.author.phone} · {b.createdAt}</div>
            </div>
          ))}
        </div>
        {sel&&(
          <div style={{...S.adminDetail,alignSelf:"start",position:"sticky",top:80}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontWeight:800,fontSize:15,color:"#111827"}}>건의 상세</span>
              <button style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#9ca3af"}} onClick={()=>setSel(null)}>✕</button>
            </div>
            {[{l:"번호",v:sel.id},{l:"분야",v:sel.cat},{l:"제목",v:sel.title},{l:"작성자",v:`${sel.author.dong}동 ${sel.author.ho}호 ${sel.author.name} (${sel.author.phone})`},{l:"등록일",v:sel.createdAt}].map(({l,v})=>(
              <div key={l} style={S.infoRow}><span style={{color:"#9ca3af",minWidth:60,fontSize:13,flexShrink:0}}>{l}</span><b style={{fontSize:13,color:"#111827"}}>{v}</b></div>
            ))}
            <div style={{padding:"12px 14px",background:"#f9fafb",borderRadius:8,fontSize:13,color:"#374151",lineHeight:1.7,margin:"12px 0 12px",borderLeft:"3px solid #e5e7eb"}}>{sel.content}</div>
            <div style={{fontWeight:700,fontSize:13,color:"#111827",marginBottom:8}}>💬 관리자 답변</div>
            {sel.status==="answered"&&sel.answer&&(
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#166534",lineHeight:1.7,marginBottom:10}}>{sel.answer}</div>
            )}
            <textarea style={{...S.inp,minHeight:80,resize:"vertical",marginBottom:10}}
              placeholder="답변을 입력하세요" value={answer} onChange={e=>setAnswer(e.target.value)}/>

function AdminAgendas({ag,patchAg,cfg,notify,isMobile}){

function PolicySection({num,title,children}){
  return(
    <div style={{marginBottom:22}}>
      <h3 style={{fontWeight:700,fontSize:14,color:"#111827",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{background:"#1f2937",color:"#fff",borderRadius:"50%",width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{num}</span>
        {title}
      </h3>
      {children}
    </div>
  );
}
function PolicyTable({rows}){
  return(
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginTop:8}}>
      <tbody>
        {rows.map(([l,v])=>(
          <tr key={l}>
            <td style={{padding:"7px 12px",background:"#f9fafb",fontWeight:600,color:"#374151",whiteSpace:"nowrap",width:120,borderBottom:"1px solid #e5e7eb",verticalAlign:"top"}}>{l}</td>
            <td style={{padding:"7px 12px",color:"#6b7280",borderBottom:"1px solid #e5e7eb"}}>{v}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function Toast({msg,type}){return<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:type==="err"?"#dc2626":"#111827",color:"#fff",padding:"10px 20px",borderRadius:8,fontWeight:600,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",maxWidth:"90vw",textOverflow:"ellipsis",overflow:"hidden"}}>{type==="err"?"✗ ":"✓ "}{msg}</div>;}

  inp:{width:"100%",padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:14,color:"#111827",background:"#fff",outline:"none",boxSizing:"border-box",WebkitAppearance:"none",minHeight:44},
