(function forceFreshVersion(){
  try {
    const url = new URL(window.location.href);
    const currentVersion = url.searchParams.get('v');
    const reloadedKey = 'forceReloaded_' + APP_VERSION;

    if (currentVersion !== APP_VERSION && sessionStorage.getItem(reloadedKey) !== '1') {
      sessionStorage.setItem(reloadedKey, '1');
      url.searchParams.set('v', APP_VERSION);
      window.location.replace(url.toString());
      return;
    }

    localStorage.setItem('APP_VERSION', APP_VERSION);

/* GAS API 호출 헬퍼 */
async function gasGet(action) {
  const sep = GAS_URL.includes('?') ? '&' : '?';
  const r = await fetch(GAS_URL + sep + 'action=' + encodeURIComponent(action) + '&v=' + encodeURIComponent(APP_VERSION) + '&_=' + Date.now(), { cache: 'no-store' });
  return r.json();
}
async function gasCall(body) {
  const sep = GAS_URL.includes('?') ? '&' : '?';
  const payload = Object.assign({}, body || {}, { clientVersion: APP_VERSION, requestAt: Date.now() });
  const r = await fetch(GAS_URL + sep + 'd=' + encodeURIComponent(JSON.stringify(payload)) + '&v=' + encodeURIComponent(APP_VERSION) + '&_=' + Date.now(), { cache: 'no-store' });
  return r.json();
}

async function verifyMember(dong, ho, name) {
  if(GAS_URL==='YOUR_GAS_URL_HERE') return true;
  try {

}
